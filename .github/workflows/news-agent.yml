name: QoriCash News Agent

on:
  schedule:
    # Every 15 minutes — catches breaking news quickly
    - cron: '*/15 * * * *'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

# Prevent overlapping runs (if a run takes longer than 15 min, skip the new one)
concurrency:
  group: news-agent
  cancel-in-progress: false

jobs:
  update-news:
    name: Fetch & publish news
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: scripts/node_modules
          key: ${{ runner.os }}-news-agent-${{ hashFiles('scripts/package.json') }}

      - name: Install dependencies
        run: npm install
        working-directory: scripts

      - name: Run news agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: node news-agent.mjs
        working-directory: scripts
