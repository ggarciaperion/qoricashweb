name: Backend Keep-Alive

on:
  schedule:
    # Every 10 minutes — prevents Render free tier from sleeping (sleeps after 15 min)
    - cron: '*/10 * * * *'
  workflow_dispatch:

jobs:
  ping:
    name: Ping backend
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Ping qoricash-trading-v2
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 https://qoricash-trading-v2.onrender.com/)
          echo "Backend responded with HTTP $STATUS"
